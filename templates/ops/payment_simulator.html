{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <h3>Ops - Simulador de Pagamento</h3>
  <p class="text-muted">Simula evento de pagamento aprovado e provisiona cliente automaticamente.</p>

  <div class="card p-3">
    <form method="POST" action="{{ url_for('ops.run_simulator') }}" class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Nome da empresa</label>
        <input class="form-control" name="company_name" placeholder="Cliente Exemplo LTDA" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Nome do admin</label>
        <input class="form-control" name="admin_name" placeholder="Admin Cliente" value="Admin">
      </div>
      <div class="col-md-4">
        <label class="form-label">E-mail do admin</label>
        <input class="form-control" name="admin_email" placeholder="admin@cliente.com" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Event ID (opcional)</label>
        <input class="form-control" name="event_id" placeholder="evt_sim_001">
        <div class="form-text">Se repetir o mesmo event_id, a idempotencia vai retornar duplicado.</div>
      </div>
      <div class="col-12">
        <button class="btn btn-primary">Simular Pagamento Aprovado</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('ops.clients') }}">Voltar para Clientes</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
