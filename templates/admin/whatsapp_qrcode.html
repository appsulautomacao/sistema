{% extends "base.html" %}

{% block content %}

<div class="container mt-5 d-flex justify-content-center">

  <div class="card shadow-lg p-4 text-center" style="max-width: 400px; border-radius: 15px;">

    <h4 class="mb-2">📲 Conectar WhatsApp</h4>
    <p class="text-muted mb-3">
      Escaneie o QR Code com seu celular
    </p>

    {% if qr %}

      <div class="mb-3">
        <img src="data:image/png;base64,{{ qr }}" 
             style="width: 260px; border-radius: 10px; border: 1px solid #eee;">
      </div>

      <div class="spinner-border text-success mb-2"></div>

      <p class="text-muted small">
        Aguardando conexão...
      </p>

    {% else %}

      <div class="alert alert-warning">
        QR Code não disponível. Tentando gerar...
      </div>

    {% endif %}

    <hr>

    <a href="/dashboard" class="btn btn-light btn-sm">
      Voltar
    </a>

  </div>

</div>

<script>
setInterval(() => {
  window.location.reload();
}, 4000);
</script>

{% endblock %}
