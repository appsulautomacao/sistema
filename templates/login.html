<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ login_title or "Login" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-color: {{ (company.primary_color if company and company.primary_color else '#0D6EFD') | e }};
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e9f1ff 100%);
    }
    .login-card {
      width: 360px;
      border: 1px solid #d9e0ea;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    .brand-badge {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #ffffff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      background: #f1f5f9;
    }
    .btn-brand {
      background: var(--brand-color);
      border-color: var(--brand-color);
      color: #fff;
    }
    .btn-brand:hover {
      filter: brightness(0.95);
      color: #fff;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center p-3">

  <form method="POST" action="{{ login_action or '/login' }}" class="login-card p-4">
    <div class="d-flex align-items-center mb-3">
      {% if company and company.logo_url %}
      <img src="{{ company.logo_url }}" class="brand-badge me-3" alt="Logo da empresa">
      {% else %}
      <div class="brand-badge me-3 d-flex align-items-center justify-content-center fw-bold text-white"
           style="background: var(--brand-color);">
        {{ (company.name[:1] if company and company.name else 'A') | upper }}
      </div>
      {% endif %}
      <div>
        <h5 class="mb-0">{{ login_title or "Login" }}</h5>
        <small class="text-muted">
          {% if company %}
            {{ company.slug }}
          {% else %}
            Acesso geral
          {% endif %}
        </small>
      </div>
    </div>

    <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
    <input type="password" name="password" class="form-control mb-3" placeholder="Senha" required>

    <button class="btn btn-brand w-100">Entrar</button>
  </form>

</body>
</html>
